server {
    listen 80;
    server_name localhost;

    # Phục vụ ứng dụng SPA
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri /index.html;
    }

    # Phục vụ file robots.txt
    location = /robots.txt {
        root /usr/share/nginx/html;
        allow all;  # Cho phép tất cả truy cập
        log_not_found off;
        access_log off;
    }

    # Đảm bảo không chặn Facebook bot dựa trên User-Agent
    if ($http_user_agent ~* "facebookexternalhit") {
        set $bot_allowed 1;
    }

    # Xử lý lỗi máy chủ 5xx
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
